---
# =============================================================================
# App Role - Deploy Financial Tracker Application
# =============================================================================

# -----------------------------------------------------------------------------
# Clone Repository
# -----------------------------------------------------------------------------

- name: Create application directory
  ansible.builtin.file:
    path: "{{ app.dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0755"

- name: Clone application repository
  ansible.builtin.git:
    repo: "{{ app.git_repo }}"
    dest: "{{ app.dir }}"
    version: "{{ app.git_branch }}"
    force: yes
  become: yes
  become_user: "{{ deploy_user }}"

- name: Create uploads directory
  ansible.builtin.file:
    path: "{{ app.dir }}/backend/uploads/receipts"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0755"

# -----------------------------------------------------------------------------
# Backend Setup
# -----------------------------------------------------------------------------

- name: Install backend dependencies (including dev for build)
  ansible.builtin.command:
    cmd: npm ci
    chdir: "{{ app.dir }}/backend"
  become: yes
  become_user: "{{ deploy_user }}"

- name: Create backend .env file
  ansible.builtin.template:
    src: backend.env.j2
    dest: "{{ app.dir }}/backend/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0600"

- name: Generate Prisma client
  ansible.builtin.command:
    cmd: npx prisma generate
    chdir: "{{ app.dir }}/backend"
  become: yes
  become_user: "{{ deploy_user }}"

- name: Build backend (compile TypeScript)
  ansible.builtin.command:
    cmd: npm run build
    chdir: "{{ app.dir }}/backend"
  become: yes
  become_user: "{{ deploy_user }}"

- name: Run database migrations
  ansible.builtin.command:
    cmd: npm run db:migrate:deploy
    chdir: "{{ app.dir }}/backend"
  become: yes
  become_user: "{{ deploy_user }}"
  environment:
    DATABASE_URL: "postgresql://{{ postgresql.db_user }}:{{ postgresql.db_password }}@localhost:5432/{{ postgresql.db_name }}"

# -----------------------------------------------------------------------------
# Cleanup devDependencies (after build)
# -----------------------------------------------------------------------------

- name: Prune backend devDependencies
  ansible.builtin.command:
    cmd: npm prune --production
    chdir: "{{ app.dir }}/backend"
  become: yes
  become_user: "{{ deploy_user }}"

# -----------------------------------------------------------------------------
# Frontend Setup
# -----------------------------------------------------------------------------

- name: Install frontend dependencies (including dev for build)
  ansible.builtin.command:
    cmd: npm ci
    chdir: "{{ app.dir }}/frontend"
  become: yes
  become_user: "{{ deploy_user }}"

- name: Create frontend .env file
  ansible.builtin.template:
    src: frontend.env.j2
    dest: "{{ app.dir }}/frontend/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0644"

- name: Build frontend (compile and bundle)
  ansible.builtin.command:
    cmd: npm run build
    chdir: "{{ app.dir }}/frontend"
  become: yes
  become_user: "{{ deploy_user }}"

- name: Prune frontend devDependencies
  ansible.builtin.command:
    cmd: npm prune --production
    chdir: "{{ app.dir }}/frontend"
  become: yes
  become_user: "{{ deploy_user }}"

# -----------------------------------------------------------------------------
# PM2 Setup
# -----------------------------------------------------------------------------

- name: Copy PM2 ecosystem config
  ansible.builtin.template:
    src: ecosystem.config.cjs.j2
    dest: "{{ app.dir }}/ecosystem.config.cjs"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0644"

- name: Start application with PM2
  ansible.builtin.command:
    cmd: pm2 start {{ app.dir }}/ecosystem.config.cjs --env production
  become: yes
  become_user: "{{ deploy_user }}"
  register: pm2_start
  changed_when: "'started' in pm2_start.stdout or 'restarted' in pm2_start.stdout"
  failed_when: false

- name: Save PM2 configuration
  ansible.builtin.command: pm2 save
  become: yes
  become_user: "{{ deploy_user }}"
  changed_when: false

# -----------------------------------------------------------------------------
# Health Check
# -----------------------------------------------------------------------------

- name: Wait for application to start
  ansible.builtin.wait_for:
    port: "{{ backend_port }}"
    host: 127.0.0.1
    delay: 5
    timeout: 60

- name: Verify application health
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ backend_port }}/api/health"
    return_content: yes
  register: health_check
  retries: 3
  delay: 5
  until: health_check.status == 200

- name: Display health check result
  ansible.builtin.debug:
    msg: "Application is healthy: {{ health_check.json }}"

# -----------------------------------------------------------------------------
# Backup Setup
# -----------------------------------------------------------------------------

- name: Setup backup cron job
  ansible.builtin.cron:
    name: "Financial Tracker database backup"
    minute: "30"
    hour: "2"
    job: "{{ app.dir }}/deploy/scripts/backup.sh >> {{ app.logs_dir }}/fintrack-backup.log 2>&1"
    user: "{{ deploy_user }}"
  when: backup.enabled | default(true)

- name: Make backup script executable
  ansible.builtin.file:
    path: "{{ app.dir }}/deploy/scripts/backup.sh"
    mode: "0755"

- name: Make deploy script executable
  ansible.builtin.file:
    path: "{{ app.dir }}/deploy/scripts/deploy.sh"
    mode: "0755"
