services:
  postgres:
    image: postgres:15-alpine
    container_name: credit-card-tracker-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: cct_user
      POSTGRES_PASSWORD: cct_password
      POSTGRES_DB: credit_card_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cct_user -d credit_card_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
